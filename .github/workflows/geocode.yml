OUTPUT = os.path.join(os.path.dirname(os.path.abspath(__file__)), "coords.json")

coords = {}
if os.path.exists(OUTPUT):
    with open(OUTPUT, "r", encoding="utf-8") as f:
        coords = json.load(f)
    print(f"Resuming: {len(coords)}/{len(STATIONS)} done")

def nominatim(query):
    if not query or not query.strip():
        return None
    url = "https://nominatim.openstreetmap.org/search?q=" + urllib.parse.quote(query.strip()) + "&format=json&limit=1&countrycodes=il"
    req = urllib.request.Request(url, headers={"Accept-Language": "he", "User-Agent": "FuelFinder/4.0"})
    try:
        with urllib.request.urlopen(req, timeout=12) as r:
            data = json.loads(r.read())
            if data:
                return [float(data[0]["lat"]), float(data[0]["lon"])]
    except Exception:
        pass
    return None

def geocode(s):
    queries = s.get("qs") or [s.get("q", s["n"] + ", ישראל")]
    for i, q in enumerate(queries):
        result = nominatim(q)
        if result:
            if i > 0:
                print(f"    (fallback {i+1}: {q[:55]})")
            return result
        if i < len(queries) - 1:
            time.sleep(1.2)
    return None

total = len(STATIONS)
for i, s in enumerate(STATIONS):
    key = str(i)
    if key in coords:
        continue
    result = geocode(s)
    coords[key] = result
    done = len(coords)
    status = f"{result[0]:.4f},{result[1]:.4f}" if result else "NOT FOUND"
    name = (s["n"] or "?")[:28]
    print(f"[{done:3d}/{total}] {name:28s}  {status}")
    if done % 20 == 0:
        with open(OUTPUT, "w", encoding="utf-8") as f:
            json.dump(coords, f, ensure_ascii=False)
    time.sleep(1.2)

with open(OUTPUT, "w", encoding="utf-8") as f:
    json.dump(coords, f, ensure_ascii=False)

found = sum(1 for v in coords.values() if v)
missing = [STATIONS[int(k)]["n"] for k,v in coords.items() if not v]
print(f"\nDone! {found}/{total} found.")
if missing:
    print(f"Still missing: {', '.join(missing)}")
