<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>תחנות דלק מורשות</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#110b02;--bg2:#1e1308;--card:#231608;--card2:#2c1c0a;
  --orange:#f5960a;--orange2:#e07c00;--green:#3dbb6a;
  --txt:#f0e8d8;--muted:#9a8870;--faint:#5a4a38;
  --border:rgba(245,150,10,0.2);
}
html,body{width:100%;overflow-x:hidden}
body{font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;padding-bottom:80px}
.hero{text-align:center;padding:28px 16px 22px;background:radial-gradient(ellipse at 50% 0%,#3a1f00 0%,var(--bg) 70%)}
.hero-logos{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px}
.pump-icon{font-size:52px;line-height:1}
.idf-img{width:72px;height:72px;object-fit:contain;mix-blend-mode:luminosity;filter:contrast(1.1)}
.hero h1{font-size:28px;font-weight:800;color:var(--orange);letter-spacing:-.5px;margin-bottom:5px}
.hero p{font-size:14px;color:var(--muted)}
.content{padding:0 12px;max-width:480px;margin:0 auto;width:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px;width:100%}
.section-label{font-size:13px;color:var(--muted);text-align:center;margin-bottom:10px}
.btn-gps{width:100%;padding:14px 16px;background:transparent;border:2px solid var(--orange);border-radius:12px;color:var(--orange);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-gps:hover{background:rgba(245,150,10,0.1)}
.btn-gps:active{transform:scale(.97)}
.divider{display:flex;align-items:center;gap:10px;margin:13px 0;color:var(--faint);font-size:13px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(to left,transparent,var(--faint),transparent)}
.coords-label{font-size:13px;color:var(--muted);margin-bottom:8px}
.coords-row{display:flex;gap:8px;width:100%}
.coord-input{flex:1;min-width:0;padding:10px 8px;background:var(--bg2);border:1px solid var(--faint);border-radius:10px;color:var(--txt);font-size:15px;font-family:inherit;text-align:center;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
.coord-input:focus{border-color:var(--orange)}
.btn-search{width:100%;margin-top:12px;padding:15px 16px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 20px rgba(245,150,10,0.3)}
.btn-search:hover{filter:brightness(1.08)}
.btn-search:active{transform:scale(.97)}
.status-box{margin-top:10px;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:500;text-align:center;display:none}
.status-box.err{background:rgba(220,60,60,0.15);border:1px solid rgba(220,60,60,0.35);color:#ff7070;display:block}
.status-box.info{background:rgba(245,150,10,0.1);border:1px solid var(--border);color:var(--orange);display:block}
/* Urea filter */
.filter-section{margin-top:14px}
.filter-label{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.filter-opts{display:flex;gap:6px}
.fopt{flex:1;position:relative}
.fopt input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.fopt label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:9px 6px;border:1px solid var(--faint);border-radius:10px;cursor:pointer;transition:all .2s;font-size:11px;font-weight:600;color:var(--muted);text-align:center;line-height:1.3;background:var(--bg2);-webkit-tap-highlight-color:transparent}
.fopt label .fopt-icon{font-size:18px;line-height:1}
.fopt input:checked + label{border-color:var(--orange);background:rgba(245,150,10,0.12);color:var(--orange)}
.fopt.green input:checked + label{border-color:var(--green);background:rgba(61,187,106,0.12);color:var(--green)}
.fopt label:active{transform:scale(.97)}
/* Results */
.results-title{font-size:14px;color:var(--muted);text-align:left;margin-bottom:10px;padding:0 2px}
.results{display:flex;flex-direction:column;gap:12px}
.station-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;overflow:hidden;border-right:3px solid var(--orange)}
.station-card.has-urea{border-right-color:var(--green)}
.station-inner{padding:13px 15px 11px}
.station-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.dist-pin{font-size:14px;color:var(--muted);display:flex;align-items:center;gap:4px}
.rank-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:4px}
.rank-1{background:#3a2800;color:#f5c842;border:1px solid #6a4800}
.rank-2{background:#222;color:#c0c0c0;border:1px solid #444}
.rank-3{background:#2a1a0a;color:#cd7f32;border:1px solid #5a3a1a}
.station-name{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:4px}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.station-brand{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.brand-delek{background:rgba(245,150,10,0.15);color:var(--orange);border:1px solid rgba(245,150,10,0.3)}
.brand-sonol{background:rgba(0,85,165,0.2);color:#5599ff;border:1px solid rgba(0,85,165,0.4)}
.urea-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(61,187,106,0.15);color:var(--green);border:1px solid rgba(61,187,106,0.35)}
.station-addr{font-size:13px;color:var(--muted)}
.nav-btns{display:flex;gap:8px;padding:10px 15px;border-top:1px solid var(--border)}
.btn-nav{flex:1;min-width:0;padding:10px 6px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-gmaps{background:#0f3020;color:#4dca88;border:1px solid #1a5030}
.btn-gmaps:hover{background:#163828}
.btn-waze{background:#0d1f38;color:#5599ff;border:1px solid #1a3060}
.btn-waze:hover{background:#142848}
.btn-nav:active{transform:scale(.97)}
/* Map */
.map-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px}
.map-title{font-size:12px;color:var(--muted);padding:8px 14px 0;display:flex;align-items:center;gap:5px}
#map-el{height:220px;width:100%}
.leaflet-container{background:#1a1208!important}
.leaflet-tile-pane{filter:brightness(.85) saturate(.7)}
/* Loading */
.loading{text-align:center;padding:32px 0;color:var(--muted);font-size:15px}
.spinner{width:36px;height:36px;border:3px solid var(--faint);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Progress */
.prog-strip{position:fixed;bottom:0;right:0;left:0;background:var(--card);border-top:1px solid var(--border);padding:8px 14px 9px;display:none;z-index:100}
.prog-inner{max-width:480px;margin:0 auto}
.prog-text{font-size:11px;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.prog-text-label{color:var(--orange);font-size:11px}
.prog-bar-wrap{flex:1;background:var(--faint);border-radius:4px;height:4px;overflow:hidden}
.prog-bar-fill{background:var(--orange);height:4px;border-radius:4px;transition:width .6s}
.prog-label{font-size:11px;color:var(--muted);white-space:nowrap}
/* Footer */
.footer{text-align:center;padding:18px 0 10px}
.footer-data{font-size:11px;color:var(--faint);margin-bottom:5px}
.footer-credit{font-size:13px;color:var(--muted);font-weight:500}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>
</head>

var CACHE_KEY="fuel_v11",cache={},geocodingActive=false,userLat=null,userLon=null,leafletMap=null;

function getFuelFilter(){
  var el=document.querySelector('input[name="fuel-filter"]:checked');
  return el?el.value:"all";
}

function loadCoordsFile(){
  fetch("./coords.json",{cache:"force-cache"})
    .then(function(r){if(!r.ok)throw new Error("no file");return r.json();})
    .then(function(data){
      var n=0;
      Object.keys(data).forEach(function(k){if(cache[k]===undefined){cache[k]=data[k];n++;}});
      if(n>0)saveCache();
      var missing=STATIONS.filter(function(_,i){return cache[String(i)]===undefined;}).length;
      if(missing===0)document.getElementById("prog-strip").style.display="none";
      else startGeocoding();
      updateProgress();
      if(userLat!==null)renderResults(findNearest(userLat,userLon));
    })
    .catch(function(){startGeocoding();});
}

try{var raw=localStorage.getItem(CACHE_KEY);if(raw)cache=JSON.parse(raw);}catch(e){}
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify(cache));}catch(e){}}
function setStatus(msg,type){var el=document.getElementById("status-box");if(!msg){el.style.display="none";el.className="status-box";return;}el.textContent=msg;el.className="status-box "+(type||"info");}
function showLoading(){document.getElementById("results-area").innerHTML='<div class="loading"><div class="spinner"></div>\u05de\u05d7\u05e4\u05e9...</div>';}
function haversine(a,b,c,d){var R=6371,dA=(c-a)*Math.PI/180,dB=(d-b)*Math.PI/180;var x=Math.sin(dA/2)*Math.sin(dA/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dB/2)*Math.sin(dB/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function formatDist(km){if(km<1)return Math.round(km*1000)+" \u05de\u05f3";return km.toFixed(1)+" \u05e7\u05f4\u05de";}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function findNearest(lat,lon){
  var filter=getFuelFilter();
  var res=[];
  for(var i=0;i<STATIONS.length;i++){
    var s=STATIONS[i];
    if(filter==="urea"    && !s.u) continue;
    if(filter==="no-urea" &&  s.u) continue;
    if(cache[String(i)]&&cache[String(i)][0])
      res.push({s:s,dist:haversine(lat,lon,cache[String(i)][0],cache[String(i)][1]),lat:cache[String(i)][0],lon:cache[String(i)][1]});
  }
  res.sort(function(a,b){return a.dist-b.dist;});
  return res.slice(0,3);
}

var RANKS=[{cls:"rank-1",label:"\u05d4\u05e7\u05e8\u05d5\u05d1\u05d4 \u05d1\u05d9\u05d5\u05ea\u05e8",emoji:"&#129351;"},{cls:"rank-2",label:"\u05e9\u05e0\u05d9\u05d9\u05d4",emoji:"&#129352;"},{cls:"rank-3",label:"\u05e9\u05dc\u05d9\u05e9\u05d9\u05ea",emoji:"&#129353;"}];

function showMap(uLat,uLon,list){
  if(!window.L)return;
  var el=document.getElementById("map-el");
  if(!el)return;
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  leafletMap=L.map("map-el",{zoomControl:true,attributionControl:false});
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:""}).addTo(leafletMap);
  var uIcon=L.divIcon({className:"",html:'<div style="width:14px;height:14px;background:#5599ff;border:2px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(85,153,255,0.3)"></div>',iconSize:[14,14],iconAnchor:[7,7]});
  L.marker([uLat,uLon],{icon:uIcon}).addTo(leafletMap).bindPopup("\u05d4\u05de\u05d9\u05e7\u05d5\u05dd \u05e9\u05dc\u05da");
  var bounds=[[uLat,uLon]];
  var colors=["#f5c842","#c0c0c0","#cd7f32"];
  list.forEach(function(item,i){
    var bg=item.s.u?"#3dbb6a":colors[i];
    var ic=L.divIcon({className:"",html:'<div style="width:26px;height:26px;background:'+bg+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0a0a0a;line-height:1">'+(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
    L.marker([item.lat,item.lon],{icon:ic}).addTo(leafletMap).bindPopup(item.s.n+(item.s.u?" (\u05d0\u05d5\u05e8\u05d9\u05d0\u05d4 \u2714)":""));
    bounds.push([item.lat,item.lon]);
  });
  leafletMap.fitBounds(bounds,{padding:[28,28],maxZoom:14});
}

function renderResults(list){
  if(!list.length){
    var done=Object.keys(cache).length;
    var filter=getFuelFilter();
    var noResultMsg=filter!=="all"?"\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5 \u05ea\u05d7\u05e0\u05d5\u05ea \u05e2\u05dd \u05d4\u05e1\u05d9\u05e0\u05d5\u05df \u05d4\u05e0\u05d1\u05d7\u05e8 \u05d1\u05e1\u05d1\u05d9\u05d1\u05d4":"\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5 \u05ea\u05d7\u05e0\u05d5\u05ea";
    document.getElementById("results-area").innerHTML='<div class="loading">'+(done<20?"\u05d4\u05e0\u05ea\u05d5\u05e0\u05d9\u05dd \u05e0\u05d8\u05e2\u05e0\u05d9\u05dd...":noResultMsg)+'</div>';
    return;
  }
  var html='<div class="results-title">\u05ea\u05d5\u05e6\u05d0\u05d5\u05ea \u05e7\u05e8\u05d5\u05d1\u05d5\u05ea \u05d0\u05dc\u05d9\u05da</div><div class="results">';
  list.forEach(function(item,i){
    var s=item.s,r=RANKS[i];
    var isDel=(s.b==="\u05d3\u05dc\u05e7");
    var bCls=isDel?"brand-delek":"brand-sonol";
    var cardCls=s.u?" has-urea":"";
    var wazeUrl="https://waze.com/ul?ll="+item.lat+","+item.lon+"&navigate=yes";
    var gmUrl="https://www.google.com/maps/dir/?api=1&destination="+item.lat+","+item.lon;
    var ureaBadge=s.u?'<span class="urea-tag">&#x1F6E2;&#xFE0F; \u05d0\u05d5\u05e8\u05d9\u05d0\u05d4</span>':'';
    html+='<div class="station-card'+cardCls+'"><div class="station-inner"><div class="station-meta"><div class="dist-pin">&#128205; '+formatDist(item.dist)+'</div><div class="rank-badge '+r.cls+'">'+r.label+' '+r.emoji+'</div></div><div class="station-name">'+esc(s.n)+'</div><div class="tags-row"><span class="station-brand '+bCls+'">'+esc(s.b)+'</span>'+ureaBadge+'</div>'+(s.a?'<div class="station-addr">'+esc(s.a)+'</div>':'')+'</div><div class="nav-btns"><a class="btn-nav btn-gmaps" href="'+gmUrl+'" target="_blank" rel="noopener">Google Maps &#128506;&#65039;</a><a class="btn-nav btn-waze" href="'+wazeUrl+'" target="_blank" rel="noopener">Waze &#128663;</a></div></div>';
  });
  html+='</div><div class="map-card"><div class="map-title">&#128205; \u05de\u05d9\u05e7\u05d5\u05dd \u05e2\u05e6\u05de\u05d9 \u05d5\u05ea\u05d7\u05e0\u05d5\u05ea \u05e7\u05e8\u05d5\u05d1\u05d5\u05ea</div><div id="map-el"></div></div>';
  document.getElementById("results-area").innerHTML=html;
  setTimeout(function(){if(userLat!==null)showMap(userLat,userLon,list);},100);
}

function onFilterChange(){if(userLat!==null){showLoading();setTimeout(function(){renderResults(findNearest(userLat,userLon));},60);}}
function doSearch(lat,lon){showLoading();userLat=lat;userLon=lon;setTimeout(function(){renderResults(findNearest(lat,lon));},80);}
function useMyLocation(){if(!navigator.geolocation){setStatus("\u05d4\u05d3\u05e4\u05d3\u05e4\u05df \u05dc\u05d0 \u05ea\u05d5\u05de\u05da \u05d1-GPS","err");return;}setStatus("\u05de\u05d0\u05ea\u05e8 \u05de\u05d9\u05e7\u05d5\u05dd...","info");navigator.geolocation.getCurrentPosition(function(pos){var lat=pos.coords.latitude,lon=pos.coords.longitude;document.getElementById("lat-in").value=lat.toFixed(5);document.getElementById("lon-in").value=lon.toFixed(5);setStatus();doSearch(lat,lon);},function(err){var m={1:"\u05dc\u05d0 \u05e0\u05d9\u05ea\u05df \u05dc\u05d0\u05ea\u05e8 \u05d0\u05ea \u05d4\u05de\u05d9\u05e7\u05d5\u05dd. \u05d9\u05e9 \u05dc\u05d0\u05e9\u05e8 \u05d4\u05e8\u05e9\u05d0\u05ea \u05de\u05d9\u05e7\u05d5\u05dd.",2:"\u05dc\u05d0 \u05e0\u05d9\u05ea\u05df \u05dc\u05e7\u05d1\u05dc \u05de\u05d9\u05e7\u05d5\u05dd.",3:"\u05e4\u05d2 \u05d4\u05d6\u05de\u05df."};setStatus(m[err.code]||"\u05e9\u05d2\u05d9\u05d0\u05d4.","err");},{enableHighAccuracy:true,timeout:12000});}
function searchByCity(){var q=document.getElementById("city-in").value.trim();if(!q){setStatus("\u05d9\u05e9 \u05dc\u05d4\u05d6\u05d9\u05df \u05e2\u05d9\u05e8 \u05d0\u05d5 \u05db\u05ea\u05d5\u05d1\u05ea","err");return;}setStatus("\u05de\u05d7\u05e4\u05e9 \u05db\u05ea\u05d5\u05d1\u05ea...","info");fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q+", \u05d9\u05e9\u05e8\u05d0\u05dc")+"&format=json&limit=1",{headers:{"Accept-Language":"he","User-Agent":"FuelFinder/4.0"}}).then(function(r){return r.json();}).then(function(d){if(!d||!d.length){setStatus("\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d4 \u05db\u05ea\u05d5\u05d1\u05ea, \u05e0\u05e1\u05d4 \u05dc\u05e4\u05e8\u05d8","err");return;}var lat=parseFloat(d[0].lat),lon=parseFloat(d[0].lon);document.getElementById("lat-in").value=lat.toFixed(5);document.getElementById("lon-in").value=lon.toFixed(5);setStatus();doSearch(lat,lon);}).catch(function(){setStatus("\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d7\u05d9\u05e4\u05d5\u05e9","err");});}
function doSearchFromCoords(){var lat=parseFloat(document.getElementById("lat-in").value);var lon=parseFloat(document.getElementById("lon-in").value);if(isNaN(lat)||isNaN(lon)){setStatus("\u05e7\u05d5\u05d0\u05d5\u05e8\u05d3\u05d9\u05e0\u05d0\u05d8\u05d5\u05ea \u05dc\u05d0 \u05ea\u05e7\u05d9\u05e0\u05d5\u05ea","err");return;}setStatus();doSearch(lat,lon);}
function updateProgress(){var done=Object.keys(cache).length;document.getElementById("prog-fill").style.width=Math.round(done/443*100)+"%";document.getElementById("prog-label").textContent=done+"/443";if(done>=443)document.getElementById("prog-strip").style.display="none";}
function geocodeNext(idx){if(idx>=STATIONS.length){geocodingActive=false;saveCache();document.getElementById("prog-strip").style.display="none";return;}if(cache[String(idx)]!==undefined){geocodeNext(idx+1);return;}var q=STATIONS[idx].q||(STATIONS[idx].n+", \u05d9\u05e9\u05e8\u05d0\u05dc");fetch("https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=1&countrycodes=il",{headers:{"Accept-Language":"he","User-Agent":"FuelFinder/4.0"}}).then(function(r){return r.json();}).then(function(d){cache[String(idx)]=(d&&d.length)?[parseFloat(d[0].lat),parseFloat(d[0].lon)]:null;if(Object.keys(cache).length%20===0)saveCache();updateProgress();if(userLat!==null)renderResults(findNearest(userLat,userLon));setTimeout(function(){geocodeNext(idx+1);},1200);}).catch(function(){setTimeout(function(){geocodeNext(idx+1);},2500);});}
function startGeocoding(){if(geocodingActive)return;var first=0;while(first<STATIONS.length&&cache[String(first)]!==undefined)first++;if(first>=STATIONS.length)return;geocodingActive=true;document.getElementById("prog-strip").style.display="block";updateProgress();geocodeNext(first);}
setTimeout(loadCoordsFile,500);
