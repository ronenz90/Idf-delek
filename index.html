<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>תחנות דלק קרובות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --card: #1f1f25;
      --border: #2e2e38;
      --accent: #f5a623;
      --accent2: #e8480c;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(245,166,35,0.12) 0%, rgba(232,72,12,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .flame-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 18px rgba(245,166,35,0.6));
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(245,166,35,0.6)); }
      50% { transform: scale(1.07); filter: drop-shadow(0 0 28px rgba(245,166,35,0.9)); }
    }

    .header h1 {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Search card */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
    }

    .search-card label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 12px;
      font-family: 'Heebo', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-location {
      background: rgba(245,166,35,0.08);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 14px 18px;
      font-size: 15px;
      width: 100%;
      margin-bottom: 4px;
    }

    .btn-location:active { opacity: 0.75; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Coord inputs stacked */
    .coord-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .coord-inputs input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      padding: 12px 12px;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
      text-align: center;
    }

    .coord-inputs input:focus { border-color: var(--accent); }
    .coord-inputs input::placeholder { color: var(--muted); font-size: 13px; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 14px;
      font-size: 15px;
      width: 100%;
      box-shadow: 0 4px 18px rgba(245,166,35,0.28);
    }
    .btn-primary:active { opacity: 0.85; transform: scale(0.98); }

    /* Helper tip */
    .tip-box {
      display: none;
      background: rgba(245,166,35,0.07);
      border: 1px solid rgba(245,166,35,0.25);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #ccc;
      line-height: 1.6;
    }
    .tip-box.show { display: block; }
    .tip-box strong { color: var(--accent); }
    .tip-box a { color: #35abe7; text-decoration: none; }

    /* Status */
    .status {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .status.show { display: flex; }
    .status.error { color: #e05050; border-color: rgba(224,80,80,0.3); background: rgba(224,80,80,0.05); }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .result-header {
      display: none;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      padding: 0 4px;
      margin-bottom: 10px;
    }
    .result-header.show { display: block; }

    .results { display: flex; flex-direction: column; gap: 12px; }

    .station-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: slideIn 0.35s ease both;
      position: relative;
      overflow: hidden;
    }
    .station-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .station-card:nth-child(2) { animation-delay: 0.08s; }
    .station-card:nth-child(3) { animation-delay: 0.16s; }

    .station-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .station-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(245,166,35,0.1);
      border-radius: 6px;
      padding: 3px 9px;
    }
    .station-distance {
      font-size: 13px;
      color: var(--muted);
    }
    .station-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 3px;
      line-height: 1.3;
    }
    .station-address {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 14px;
    }
    .nav-buttons {
      display: flex;
      gap: 8px;
    }
    .btn-nav {
      flex: 1;
      padding: 10px 10px;
      font-size: 14px;
      border-radius: 10px;
      gap: 5px;
      font-weight: 700;
      border: none;
    }
    .btn-waze {
      background: rgba(53,171,231,0.12);
      border: 1px solid rgba(53,171,231,0.3) !important;
      color: #35abe7;
    }
    .btn-waze:active { background: rgba(53,171,231,0.25); }
    .btn-gmaps {
      background: rgba(66,183,100,0.12);
      border: 1px solid rgba(66,183,100,0.3) !important;
      color: #42b764;
    }
    .btn-gmaps:active { background: rgba(66,183,100,0.25); }

    .footer {
      margin-top: 36px;
      text-align: center;
      font-size: 11px;
      color: #3a3a44;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <span class="flame-icon">⛽</span>
      <h1>תחנות דלק קרובות</h1>
      <p>3 תחנות הדלק הקרובות אליך</p>
    </div>

    <div class="search-card">
      <label>זהה מיקום אוטומטית</label>
      <button class="btn btn-location" onclick="getLocation()">
        📍 השתמש במיקום הנוכחי שלי
      </button>

      <div class="divider">או הזן קואורדינטות ידנית</div>

      <div class="coord-inputs">
        <input type="number" id="lat" placeholder="קו רוחב (31.77)" step="any" inputmode="decimal" />
        <input type="number" id="lng" placeholder="קו אורך (35.21)" step="any" inputmode="decimal" />
      </div>
      <button class="btn btn-primary" onclick="searchStations()">🔍 חפש תחנות</button>
    </div>

    <!-- Shown when geolocation fails on local file -->
    <div class="tip-box" id="tipBox">
      <strong>💡 כיצד לקבל קואורדינטות?</strong><br>
      1. פתח <a href="https://maps.google.com" target="_blank">Google Maps</a><br>
      2. לחץ לחיצה ארוכה על מיקומך<br>
      3. העתק את המספרים שמופיעים למטה (לדוגמה: 31.7767, 35.2345)<br>
      4. הדבק בשדות למעלה ולחץ חפש
    </div>

    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="statusText"></span>
    </div>

    <div class="result-header" id="resultHeader">תוצאות קרובות אליך</div>
    <div class="results" id="results"></div>

    <div class="footer">נתונים: OpenStreetMap · Overpass API</div>
  </div>

  <script>
    function showStatus(msg, isError = false, showSpinner = true) {
      const el = document.getElementById('status');
      el.className = 'status show' + (isError ? ' error' : '');
      document.getElementById('spinner').style.display = showSpinner ? 'block' : 'none';
      document.getElementById('statusText').textContent = msg;
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    function showTip() {
      document.getElementById('tipBox').className = 'tip-box show';
    }

    function getLocation() {
      // Detect local file — geolocation blocked by browser on file:// and content://
      const proto = location.protocol;
      if (proto === 'file:' || proto === 'content:' || proto === 'blob:') {
        showStatus('מיקום אוטומטי לא זמין בקובץ מקומי.', true, false);
        showTip();
        return;
      }

      if (!navigator.geolocation) {
        showStatus('הדפדפן שלך לא תומך באיתור מיקום.', true, false);
        showTip();
        return;
      }

      showStatus('מאתר את המיקום שלך...');
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          document.getElementById('lat').value = lat.toFixed(6);
          document.getElementById('lng').value = lng.toFixed(6);
          document.getElementById('tipBox').className = 'tip-box';
          searchStations();
        },
        (err) => {
          let msg = 'לא ניתן לאתר מיקום. ';
          if (err.code === 1) msg = 'נדרשת הרשאת מיקום — אפשר בדפדפן ונסה שוב.';
          else if (err.code === 2) msg = 'מיקום לא זמין כרגע, נסה שוב.';
          else if (err.code === 3) msg = 'פג הזמן לאיתור מיקום, נסה שוב.';
          showStatus(msg, true, false);
          showTip();
        },
        { timeout: 12000, enableHighAccuracy: true }
      );
    }

    async function searchStations() {
      const lat = parseFloat(document.getElementById('lat').value);
      const lng = parseFloat(document.getElementById('lng').value);

      if (isNaN(lat) || isNaN(lng)) {
        showStatus('אנא הכנס קואורדינטות תקינות.', true, false);
        return;
      }

      document.getElementById('results').innerHTML = '';
      document.getElementById('resultHeader').className = 'result-header';
      showStatus('מחפש תחנות דלק בקרבתך...');

      const radius = 5000;
      const query = `
        [out:json][timeout:20];
        (
          node["amenity"="fuel"](around:${radius},${lat},${lng});
          way["amenity"="fuel"](around:${radius},${lat},${lng});
        );
        out center 25;
      `;

      try {
        const res = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          body: query
        });

        if (!res.ok) throw new Error('network');
        const data = await res.json();

        if (!data.elements || data.elements.length === 0) {
          showStatus('לא נמצאו תחנות דלק ב-5 ק"מ. נסה מיקום אחר.', true, false);
          return;
        }

        const stations = data.elements.map(el => {
          const sLat = el.lat ?? el.center?.lat;
          const sLng = el.lon ?? el.center?.lon;
          const dist = haversine(lat, lng, sLat, sLng);
          const tags = el.tags || {};
          const name = tags['name:he'] || tags.name || tags.brand || 'תחנת דלק';
          const address = buildAddress(tags);
          return { lat: sLat, lng: sLng, dist, name, address };
        });

        stations.sort((a, b) => a.dist - b.dist);
        const top3 = stations.slice(0, 3);

        hideStatus();
        document.getElementById('resultHeader').className = 'result-header show';
        renderResults(top3);

      } catch (e) {
        showStatus('שגיאה בחיפוש. בדוק חיבור לאינטרנט ונסה שוב.', true, false);
      }
    }

    function buildAddress(tags) {
      const parts = [];
      if (tags['addr:street']) {
        let s = tags['addr:street'];
        if (tags['addr:housenumber']) s += ' ' + tags['addr:housenumber'];
        parts.push(s);
      }
      if (tags['addr:city']) parts.push(tags['addr:city']);
      return parts.length ? parts.join(', ') : 'כתובת לא ידועה';
    }

    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function toRad(d) { return d * Math.PI / 180; }

    function formatDist(m) {
      return m < 1000 ? Math.round(m) + ' מ׳' : (m / 1000).toFixed(1) + ' ק"מ';
    }

    const ranks = ['🥇 הקרובה ביותר', '🥈 שנייה', '🥉 שלישית'];

    function renderResults(stations) {
      const container = document.getElementById('results');
      container.innerHTML = '';
      stations.forEach((s, i) => {
        const wazeUrl = `https://waze.com/ul?ll=${s.lat},${s.lng}&navigate=yes`;
        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving`;
        const card = document.createElement('div');
        card.className = 'station-card';
        card.innerHTML = `
          <div class="station-top">
            <span class="station-rank">${ranks[i]}</span>
            <span class="station-distance">📍 ${formatDist(s.dist)}</span>
          </div>
          <div class="station-name">${s.name}</div>
          <div class="station-address">${s.address}</div>
          <div class="nav-buttons">
            <a class="btn btn-nav btn-waze" href="${wazeUrl}" target="_blank" rel="noopener">🚗 Waze</a>
            <a class="btn btn-nav btn-gmaps" href="${mapsUrl}" target="_blank" rel="noopener">🗺️ Google Maps</a>
          </div>
        `;
        container.appendChild(card);
      });
    }
  </script>
</body>
</html>
