name: Geocode Stations

on:
  push:
    paths:
      - 'fuel-finder.html'   # runs whenever the main file changes
  workflow_dispatch:          # also allows manual trigger from GitHub UI

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run geocoding script
        run: python3 geocode_stations.py

      - name: Commit coords.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coords.json
          git diff --cached --quiet || git commit -m "auto: update coords.json [skip ci]"
          git push

